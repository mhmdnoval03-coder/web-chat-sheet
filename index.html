<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Chat & Sheet Authentication</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Tema Background Gradasi Modern */
        body { 
            background: linear-gradient(135deg, #1f4068, #162447, #1b1b2f);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: #333;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container { width: 100%; max-width: 450px; padding: 20px; }
        
        /* Efek Kaca (Glassmorphism) pada Card */
        .card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); 
        }
        
        .card h2 { margin-bottom: 20px; color: #162447; text-align: center; font-weight: 700; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 6px; color: #4a5568; font-size: 13px; font-weight: 600; }
        .input-group input { width: 100%; padding: 11px 14px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 14px; transition: all 0.3s; }
        .input-group input:focus { border-color: #3182ce; box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.15); outline: none; }
        
        .btn-primary { width: 100%; padding: 12px; background-color: #3182ce; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 600; margin-top: 10px; transition: background 0.2s; }
        .btn-primary:hover { background-color: #2b6cb0; }
        
        .card-footer { margin-top: 20px; text-align: center; font-size: 14px; color: #718096; }
        .card-footer a { color: #3182ce; text-decoration: none; font-weight: 600; }
        .card-footer a:hover { text-decoration: underline; }
        
        /* Tampilan Ruang Chat */
        #chatSection { display: none; }
        .chat-box { height: 260px; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; overflow-y: scroll; margin-bottom: 15px; background: #f7fafc; }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- 1. KARTU PENDAFTARAN (REGISTER) -->
        <div id="registerCard" class="card">
            <h2>Daftar Akun Baru</h2>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Masukkan username" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Masukkan email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Buat password" required>
                </div>
                <input type="hidden" name="action" value="register">
                <button type="submit" class="btn-primary" id="regBtn">Daftar Sekarang</button>
            </form>
            <div class="card-footer">
                <span>Sudah punya akun? <a href="#" onclick="switchView('loginCard')">Masuk di sini</a></span>
            </div>
        </div>

        <!-- 2. KARTU MASUK (LOGIN) -->
        <div id="loginCard" class="card" style="display: none;">
            <h2>Masuk</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Masukkan email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Masukkan password" required>
                </div>
                <input type="hidden" name="action" value="login">
                <button type="submit" class="btn-primary" id="logBtn">Masuk</button>
            </form>
            <div class="card-footer">
                <span>Belum punya akun? <a href="#" onclick="switchView('registerCard')">Daftar</a></span>
            </div>
        </div>

        <!-- 3. RUANG CHAT -->
        <div id="chatSection" class="card">
            <h2>Ruang Chat</h2>
            <p id="welcomeUser" style="margin-bottom: 15px; font-weight: 600; color: #2d3748; text-align: center;"></p>
            
            <div class="input-group" style="margin-bottom: 10px;">
                <label>Kirim pesan ke (Username Teman):</label>
                <input type="text" id="targetFriend" placeholder="Cth: budi123">
            </div>

            <div class="chat-box" id="chatHistory">
                <p style="color: #a0aec0; text-align: center; margin-top: 90px;">Belum ada pesan...</p>
            </div>

            <form onsubmit="sendMessage(event)" style="display: flex; gap: 8px;">
                <input type="text" id="messageInput" placeholder="Ketik pesan..." required style="flex: 1; padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px;">
                <button type="submit" class="btn-primary" style="margin-top: 0; width: 80px;">Kirim</button>
            </form>
            
            <div class="card-footer" style="margin-top: 15px;">
                <a href="#" onclick="logout()" style="color: #e53e3e;">Keluar (Logout)</a>
            </div>
        </div>

    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycby9T8Y82PS5w9TijNj3rJfUfWG_USC4LQyRr1vn29agMjo-tHzCWfFbT2kTeZMPYTFs/exec';

        function switchView(cardName) {
            document.getElementById('registerCard').style.display = 'none';
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('chatSection').style.display = 'none';
            
            if(cardName === 'registerCard') document.getElementById('registerCard').style.display = 'block';
            if(cardName === 'loginCard') document.getElementById('loginCard').style.display = 'block';
            if(cardName === 'chatSection') document.getElementById('chatSection').style.display = 'block';
        }

        window.onload = function() {
            const savedUser = localStorage.getItem('chatUser');
            if (savedUser) {
                document.getElementById('welcomeUser').innerText = 'Halo, ' + savedUser + '!';
                switchView('chatSection');
            }
        };

        function handleRegister(event) {
            event.preventDefault();
            const form = document.getElementById('registerForm');
            const data = new URLSearchParams(new FormData(form));
            const btn = document.getElementById('regBtn');
            
            btn.innerText = 'Memproses...';
            btn.disabled = true;

            fetch(scriptURL, { method: 'POST', body: data })
            .then(res => res.json())
            .then(result => {
                alert(result.message);
                if(result.status === 'success') {
                    form.reset();
                    switchView('loginCard');
                }
            })
            .catch(err => alert('Terjadi kesalahan jaringan.'))
            .finally(() => {
                btn.innerText = 'Daftar Sekarang';
                btn.disabled = false;
            });
        }

        function handleLogin(event) {
            event.preventDefault();
            const form = document.getElementById('loginForm');
            const data = new URLSearchParams(new FormData(form));
            const btn = document.getElementById('logBtn');
            
            btn.innerText = 'Masuk...';
            btn.disabled = true;

            fetch(scriptURL, { method: 'POST', body: data })
            .then(res => res.json())
            .then(response => {
                if(response.status === 'success') {
                    localStorage.setItem('chatUser', response.username);
                    document.getElementById('welcomeUser').innerText = 'Halo, ' + response.username + '!';
                    form.reset();
                    switchView('chatSection');
                } else {
                    alert('Login Gagal: ' + response.message);
                }
            })
            .catch(err => alert('Terjadi kesalahan koneksi ke server.'))
            .finally(() => {
                btn.innerText = 'Masuk';
                btn.disabled = false;
            });
        }

        function logout() {
            localStorage.removeItem('chatUser');
            switchView('loginCard');
        }

        function sendMessage(event) {
            event.preventDefault();
            const target = document.getElementById('targetFriend').value;
            const msg = document.getElementById('messageInput').value;

            if(!target) {
                alert('Tulis username teman tujuan terlebih dahulu!');
                return;
            }

            alert('Pesan berhasil dikirim ke ' + target + ': ' + msg);
            document.getElementById('messageInput').value = '';
        }
    </script>
</body>
</html>
